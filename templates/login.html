<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome Outline Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-body">
    <div class="login-card">
        <h1 class="login-title">Sign In</h1>
        {% if msg %}
            <p class="error-msg">{{ msg }}</p>
        {% endif %}
        <form action="{{ url_for('login') }}" method="post">
            
            <!-- Username with Vector Outline Icon -->
            <div class="input-wrapper">
                <i class="fa-regular fa-user input-icon"></i>
                <input type="text" name="username" required placeholder="Username or email">
            </div>
            
            <!-- Password with Vector Outline Icon -->
            <div class="input-wrapper">
                <i class="fa-regular fa-lock input-icon"></i>
                <input type="password" name="password" required placeholder="Password">
            </div>

            <div class="meta-row">
                <label><input type="checkbox"> Remember me</label>
                <a href="#">Forgot password?</a>
            </div>
            
            <button type="submit" class="action-btn">Sign In</button>
        </form>
    </div>
</body>
</html>
